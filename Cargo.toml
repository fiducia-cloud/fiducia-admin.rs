[package]
name = "fiducia-admin"
version = "0.1.0"
edition = "2021"
description = "Admin app for fiducia.cloud — server-rendered HTML dashboard for accounts/API keys (via fiducia-auth) and infra ops (via fiducia-brain)."

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.5", features = ["trace", "timeout", "limit", "catch-panic"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Shared OpenTelemetry + tracing setup (one init() for all services).
fiducia-telemetry = { git = "https://github.com/fiducia-cloud/fiducia-telemetry.rs", tag = "v0.1.0" }

# Shared API payload/error contract (generated from fiducia-interfaces schemas) —
# the one source of truth for the types every fiducia service speaks.
fiducia-interfaces = { path = "../fiducia-interfaces/generated/rust" }

# NOTE: calling fiducia-auth (sessions/keys) and fiducia-brain (infra) needs an
# HTTP client (reqwest). Stubbed in src/upstream.rs to keep the skeleton light.
